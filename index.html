<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WajraConnect | Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="modern.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050505;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.4);
    }

    .login-card {
      width: 480px;
      padding: 48px;
      text-align: center;
    }

    .logo-container {
      margin-bottom: 32px;
    }

    .logo-img {
      width: 80px;
      height: auto;
      margin-bottom: 16px;
    }

    .btn-premium {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 24px;
    }

    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 188, 212, 0.1);
    }

    .footer-links {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .footer-links aria-label {
      color: var(--primary);
      text-decoration: none;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.8s ease;
    }
  </style>
</head>

<body>
  <video autoplay muted loop class="video-bg">
    <source src="mv.mp4" type="video/mp4">
  </video>

  <div class="loader" id="loader">
    <img src="Untitled design (2).gif" style="width: 920px;">
  </div>

  <div class="glass login-card animate-fade-in">
    <div class="logo-container">
      <img src="pulse.png" class="logo-img" alt="WajraConnect Logo">
      <h1 class="gradient-text">WajraConnect</h1>
      <p class="text-dim">Protecting women. Connecting help.</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div id="errorMsg" style="color: var(--danger); font-size: 14px; margin-bottom: 16px; min-height: 20px;"></div>

      <button type="submit" class="btn-primary btn-premium" id="loginBtn">Sign In</button>
    </form>

    <div class="footer-links">
      Don't have an account? <a href="signup.html" style="color: var(--primary);">Join Now</a>
    </div>
    <p style="margin-top: 20px; font-size: 12px; color: var(--text-dim);">🛡️ Enterprise Grade Encryption</p>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

  <script src="auth.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (getToken()) {
        window.location.href = 'dashboard.html';
        return;
      }
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
      }, 1000);
    });

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";
      errorMsg.textContent = "";

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        // Profile fetch is handled in requireLogin or after login
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message || 'Invalid credentials';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>

</html>
